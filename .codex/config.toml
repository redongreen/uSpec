# Codex MCP configuration for uSpec
# Uncomment ONE of the two Figma MCP providers below and replace the token placeholder.
# For the latest setup instructions, see:
#   Console MCP: https://docs.figma-console-mcp.southleft.com/
#   Native MCP:  https://github.com/figma/figma-mcp

# --- Option 1: Figma Console MCP (Southleft) — requires Desktop Bridge plugin ---
[mcp_servers.figma-console]
command = "npx"
args = ["-y", "figma-console-mcp@latest"]

[mcp_servers.figma-console.env]
FIGMA_ACCESS_TOKEN = "figd_YOUR_TOKEN_HERE"

# --- Option 2: Native Figma MCP (Figma) — direct API access, no plugin required ---
# [mcp_servers.figma]
# command = "npx"
# args = ["-y", "@anthropic-ai/figma-mcp@latest"]
#
# [mcp_servers.figma.env]
# FIGMA_API_KEY = "figd_YOUR_TOKEN_HERE"
