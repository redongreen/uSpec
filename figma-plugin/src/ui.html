<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: var(--figma-color-bg, #ffffff);
        --bg-secondary: var(--figma-color-bg-secondary, #f5f5f5);
        --fg: var(--figma-color-text, #1e1e1e);
        --fg-muted: var(--figma-color-text-secondary, #757575);
        --border: var(--figma-color-border, #e6e6e6);
        --accent: var(--figma-color-bg-brand, #0d99ff);
        --accent-fg: var(--figma-color-text-onbrand, #ffffff);
        --danger: var(--figma-color-text-danger, #e03e1a);
        --success: var(--figma-color-text-success, #1e7a1e);
      }

      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 11px;
        color: var(--fg);
        background: var(--bg);
      }
      body {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
        flex: none;
      }
      header h1 {
        margin: 0;
        font-size: 12px;
        font-weight: 600;
      }
      header .subtitle {
        margin-top: 2px;
        color: var(--fg-muted);
        font-size: 11px;
      }

      main {
        flex: 1;
        min-height: 0;
        overflow: auto;
        padding: 12px 16px;
      }

      footer {
        padding: 12px 16px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 8px;
        background: var(--bg);
        flex: none;
      }

      .meta-footer {
        padding: 6px 16px 8px;
        background: var(--bg);
        flex: none;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 10px;
        color: var(--fg-muted);
      }
      .meta-footer a {
        color: var(--fg-muted);
        text-decoration: none;
      }
      .meta-footer a:hover {
        color: var(--fg);
        text-decoration: underline;
      }

      button {
        font: inherit;
        cursor: pointer;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 12px;
        background: var(--bg);
        color: var(--fg);
      }
      button.primary {
        background: var(--accent);
        color: var(--accent-fg);
        border-color: transparent;
      }
      button.primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      button.secondary {
        background: var(--bg-secondary);
      }

      .empty {
        padding: 48px 16px;
        text-align: center;
        color: var(--fg-muted);
      }

      .summary {
        padding: 8px 10px;
        background: var(--bg-secondary);
        border-radius: 6px;
        margin-bottom: 12px;
      }
      .summary strong { font-weight: 600; }

      .section-label {
        font-weight: 600;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin: 12px 0 6px;
        color: var(--fg-muted);
      }

      .child {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 6px 10px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        margin-bottom: 6px;
      }
      .child-name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; }
      .child-meta { grid-column: 1 / -1; color: var(--fg-muted); font-size: 10px; }
      .count-badge {
        display: inline-block;
        margin-left: 4px;
        padding: 1px 6px;
        font-weight: 600;
        font-size: 10px;
        background: var(--bg-secondary);
        color: var(--fg-muted);
        border-radius: 999px;
      }

      .seg {
        display: inline-flex;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
        background: var(--bg);
      }
      .seg button {
        border: none;
        border-radius: 0;
        padding: 4px 10px;
        background: transparent;
        font-size: 10px;
        color: var(--fg-muted);
      }
      .seg button.active {
        background: var(--accent);
        color: var(--accent-fg);
      }
      .seg button.locked {
        background: var(--bg-secondary);
        color: var(--fg-muted);
        cursor: default;
      }

      textarea {
        width: 100%;
        min-height: 60px;
        padding: 6px 8px;
        font: inherit;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--bg);
        color: var(--fg);
        resize: vertical;
      }

      .log {
        margin-top: 12px;
        padding: 8px 10px;
        background: var(--bg-secondary);
        border-radius: 6px;
        font-family: 'SF Mono', Menlo, monospace;
        font-size: 10px;
        white-space: pre-wrap;
        max-height: 140px;
        overflow: auto;
      }
      .log .err { color: var(--danger); }
      .log .ok { color: var(--success); }

      .filename {
        font-family: 'SF Mono', Menlo, monospace;
        font-size: 10px;
        color: var(--fg-muted);
      }

      .flex-grow { flex: 1; }
    </style>
  </head>
  <body>
    <header>
      <h1>uSpec Extract</h1>
      <div class="subtitle" id="subtitle">Select a component or component set to begin.</div>
    </header>

    <main id="main">
      <div class="empty" id="emptyState">
        Select a component or component set on the canvas.
      </div>
    </main>

    <footer>
      <button class="secondary" id="refreshBtn">Refresh</button>
      <div class="flex-grow"></div>
      <button class="secondary" id="copyBtn" disabled>Copy JSON</button>
      <button class="primary" id="downloadBtn" disabled>Extract &amp; download</button>
    </footer>

    <div class="meta-footer">
      <span><a href="https://uspec.design/" target="_blank" rel="noopener noreferrer">uSpec.design</a> (extractor v2.1.0)</span>
      <span>by <a href="https://www.linkedin.com/in/iguisard/" target="_blank" rel="noopener noreferrer">Ian Guisard</a></span>
    </div>

    <!-- UI_BUNDLE -->
  </body>
</html>
